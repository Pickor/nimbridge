name: Crawler

on:
  schedule:
    # Every 6 hours at :00 UTC
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

jobs:
  scrape:
    name: "${{ matrix.label }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          # ── Whisky (437) ──────────────────────────────────────────────────
          - { category: 437, sub: "441",  label: "Exclusive Whisky" }
          - { category: 437, sub: "1475", label: "Japanese & Asian Whisky" }
          - { category: 437, sub: "461",  label: "Regular Whisky" }

          # ── Rum, Cognac & Fine Spirits (965) ──────────────────────────────
          - { category: 965, sub: "705",  label: "Rum" }
          - { category: 965, sub: "1477", label: "Exclusive Rum" }
          - { category: 965, sub: "615",  label: "Cognac & Armagnac" }
          - { category: 965, sub: "1503", label: "Exclusive Cognac" }
          - { category: 965, sub: "967",  label: "Fine Spirits" }
          - { category: 965, sub: "1638", label: "Chartreuse" }

          # ── Wine (443) ────────────────────────────────────────────────────
          - { category: 443, sub: "447",  label: "Exclusive Wine" }
          - { category: 443, sub: "695",  label: "Bordeaux Grand Cru Wine" }
          - { category: 443, sub: "765",  label: "Burgundy Crus Wine" }
          - { category: 443, sub: "463",  label: "Premium Wine" }
          - { category: 443, sub: "1025", label: "Italian Wine" }
          - { category: 443, sub: "1473", label: "Rhone Valley Wine" }
          - { category: 443, sub: "937",  label: "Spanish & Portuguese Wine" }
          - { category: 443, sub: "737",  label: "Big Bottles Wine" }

          # ── Champagne (961) ───────────────────────────────────────────────
          - { category: 961, sub: "613",  label: "Champagne" }
          - { category: 961, sub: "929",  label: "Dom Perignon" }

          # ── Port & Sweet Wines (971) ──────────────────────────────────────
          - { category: 971, sub: "449",  label: "Port & Madeira" }
          - { category: 971, sub: "973",  label: "Dessert & Sweet Wines" }

          # ── Beer (963) ────────────────────────────────────────────────────
          - { category: 963, sub: "",     label: "Beer" }

          # ── Jewellery ─────────────────────────────────────────────────────
          - { category: 715, sub: "",     label: "Diamonds" }
          - { category: 313, sub: "1660", label: "Jewellery — Gold" }
          - { category: 313, sub: "841",  label: "Jewellery — Silver" }

          # ── Watches ───────────────────────────────────────────────────────
          - { category: 333, sub: "343",  label: "Watches — Rolex" }
          - { category: 333, sub: "697",  label: "Watches — Omega" }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run scraper — ${{ matrix.label }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm exec tsx scraper/run-one.ts ${{ matrix.category }} ${{ matrix.sub }}
